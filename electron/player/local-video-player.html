<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vídeo local — LouvorJA - PIANO</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background: #000;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }
      #error {
        display: none;
        max-width: 28rem;
        padding: 1rem 1.25rem;
        color: #f8fafc;
        font: 500 0.95rem/1.4 system-ui, sans-serif;
        text-align: center;
      }
      #error.is-visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <video
        id="player"
        playsinline
        autoplay
        preload="auto"
      ></video>
      <p id="error">Não foi possível carregar o vídeo local.</p>
    </div>
    <script>
      ;(() => {
        const params = new URLSearchParams(window.location.search)
        const src = params.get('src') || ''
        const video = document.getElementById('player')
        const error = document.getElementById('error')

        if (!src || !video) {
          if (error) error.classList.add('is-visible')
          if (video) video.style.display = 'none'
          return
        }

        video.src = src
        video.addEventListener('error', () => {
          error?.classList.add('is-visible')
          video.style.display = 'none'
        })

        const play = () => {
          void video.play().catch(() => {})
        }
        if (video.readyState >= 2) play()
        else video.addEventListener('loadeddata', play, { once: true })
      })()
    </script>
  </body>
</html>
